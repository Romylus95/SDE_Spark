# Log4j2 config for SDE_Spark
# Used when Log4j2 is the SLF4J provider (Spark runtime, standalone processes)
# For logback-only environments, logback.xml takes precedence.

rootLogger.level = WARN
rootLogger.appenderRef.console.ref = ConsoleAppender

appender.console.type = Console
appender.console.name = ConsoleAppender
appender.console.layout.type = PatternLayout
appender.console.layout.pattern = %d{HH:mm:ss.SSS} [%t] %-5level %logger{36} - %msg%n

# SDE application logging
logger.sde.name = infore.sde.spark
logger.sde.level = INFO

# Quiet noisy libraries
logger.spark.name = org.apache.spark
logger.spark.level = WARN

logger.kafka.name = org.apache.kafka
logger.kafka.level = WARN

logger.jetty.name = org.eclipse.jetty
logger.jetty.level = WARN

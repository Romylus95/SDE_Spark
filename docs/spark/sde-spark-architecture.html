<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SDE Spark Architecture Diagram</title>
  <style>
    body { background: white; font-family: Arial, sans-serif; margin: 0; padding: 30px; }
    svg  { display: block; margin: 0 auto; }
    p    { text-align: center; font-weight: bold; font-size: 14px; font-family: Arial, sans-serif; margin-top: 6px; }
  </style>
</head>
<body>

<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="520" viewBox="0 0 1150 520">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#1565C0"/>
    </marker>
    <marker id="ar" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#C62828"/>
    </marker>
    <marker id="ag" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#2E7D32"/>
    </marker>
    <marker id="ap" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto">
      <polygon points="0 0, 8 3.5, 0 7" fill="#6A1B9A"/>
    </marker>
    <marker id="arocksdb" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto">
      <polygon points="0 0, 7 3.5, 0 7" fill="#2E7D32"/>
    </marker>
  </defs>

  <!-- ══════════════════════════════════════════════════════════════════
       LAYER HEADER BAND
       ══════════════════════════════════════════════════════════════════ -->
  <rect x="0" y="0" width="1150" height="40" fill="#EEF2F7" rx="0"/>

  <!-- Layer labels — line 1 (bold) and line 2 (light) -->
  <!-- Input -->
  <text x="77"   y="16" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-family="Arial">Input</text>
  <text x="77"   y="30" text-anchor="middle" font-size="10" fill="#666" font-family="Arial">Kafka</text>

  <!-- Layer 1 -->
  <text x="215"  y="16" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold" font-family="Arial">Layer 1</text>
  <text x="215"  y="30" text-anchor="middle" font-size="10" fill="#555" font-family="Arial">Ingestion &amp; Parsing</text>

  <!-- Layer 2 -->
  <text x="420"  y="16" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold" font-family="Arial">Layer 2</text>
  <text x="420"  y="30" text-anchor="middle" font-size="10" fill="#555" font-family="Arial">Routing &amp; Registration</text>

  <!-- Layer 3 -->
  <text x="655"  y="16" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold" font-family="Arial">Layer 3</text>
  <text x="655"  y="30" text-anchor="middle" font-size="10" fill="#555" font-family="Arial">Synopsis Processing</text>

  <!-- Layer 4 -->
  <text x="815"  y="16" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold" font-family="Arial">Layer 4</text>
  <text x="815"  y="30" text-anchor="middle" font-size="10" fill="#555" font-family="Arial">Path Splitting</text>

  <!-- Layer 5 -->
  <text x="950"  y="16" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold" font-family="Arial">Layer 5</text>
  <text x="950"  y="30" text-anchor="middle" font-size="10" fill="#555" font-family="Arial">Aggregation</text>

  <!-- Layer 6 -->
  <text x="1083" y="16" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold" font-family="Arial">Layer 6</text>
  <text x="1083" y="30" text-anchor="middle" font-size="10" fill="#555" font-family="Arial">Output</text>

  <!-- ══════════════════════════════════════════════════════════════════
       VERTICAL LAYER SEPARATORS  (dashed light lines)
       ══════════════════════════════════════════════════════════════════ -->
  <line x1="154"  y1="40" x2="154"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="277"  y1="40" x2="277"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="563"  y1="40" x2="563"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="748"  y1="40" x2="748"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="883"  y1="40" x2="883"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="1017" y1="40" x2="1017" y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- ══════════════════════════════════════════════════════════════════
       KAFKA DATA TOPIC
       ══════════════════════════════════════════════════════════════════ -->
  <ellipse cx="75" cy="140" rx="68" ry="38" fill="#DCEEFB" stroke="#1565C0" stroke-width="2.5"/>
  <text x="75" y="130" text-anchor="middle" font-size="11" fill="#1565C0" font-weight="bold" font-family="Arial">☁ kafka</text>
  <text x="75" y="146" text-anchor="middle" font-size="13" fill="#1565C0" font-weight="bold" font-family="Arial">Data</text>
  <text x="75" y="162" text-anchor="middle" font-size="13" fill="#1565C0" font-weight="bold" font-family="Arial">Topic</text>

  <!-- ══════════════════════════════════════════════════════════════════
       KAFKA REQUEST TOPIC
       ══════════════════════════════════════════════════════════════════ -->
  <ellipse cx="75" cy="258" rx="68" ry="38" fill="#FFEBEE" stroke="#C62828" stroke-width="2.5"/>
  <text x="75" y="248" text-anchor="middle" font-size="11" fill="#C62828" font-weight="bold" font-family="Arial">☁ kafka</text>
  <text x="75" y="264" text-anchor="middle" font-size="13" fill="#C62828" font-weight="bold" font-family="Arial">Request</text>
  <text x="75" y="280" text-anchor="middle" font-size="13" fill="#C62828" font-weight="bold" font-family="Arial">Topic</text>

  <!-- ══════════════════════════════════════════════════════════════════
       PARSE MAP — DATA
       ══════════════════════════════════════════════════════════════════ -->
  <rect x="166" y="118" width="78" height="44" rx="8" fill="#DCEEFB" stroke="#1565C0" stroke-width="2"/>
  <text x="205" y="137" text-anchor="middle" font-size="13" fill="#1565C0" font-weight="bold" font-family="Arial">parse</text>
  <text x="205" y="154" text-anchor="middle" font-size="11" fill="#1565C0" font-family="Arial">Map</text>

  <!-- ══════════════════════════════════════════════════════════════════
       PARSE MAP — REQUEST
       ══════════════════════════════════════════════════════════════════ -->
  <rect x="166" y="236" width="78" height="44" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <text x="205" y="255" text-anchor="middle" font-size="13" fill="#C62828" font-weight="bold" font-family="Arial">parse</text>
  <text x="205" y="272" text-anchor="middle" font-size="11" fill="#C62828" font-family="Arial">Map</text>

  <!-- ══════════════════════════════════════════════════════════════════
       ROUTING LAYER HEXAGON
       ══════════════════════════════════════════════════════════════════ -->
  <polygon points="380,108 450,148 450,230 380,270 310,230 310,148"
           fill="white" stroke="#333" stroke-width="2.5"/>
  <line x1="315" y1="189" x2="445" y2="189" stroke="#DDD" stroke-width="1.5"/>
  <text x="380" y="162" text-anchor="middle" font-size="13" fill="#1565C0" font-weight="bold" font-family="Arial">DataRouter</text>
  <text x="380" y="178" text-anchor="middle" font-size="10" fill="#1565C0" font-style="italic" font-family="Arial">HashData</text>
  <text x="380" y="213" text-anchor="middle" font-size="13" fill="#C62828" font-weight="bold" font-family="Arial">RequestRouter</text>
  <text x="380" y="229" text-anchor="middle" font-size="10" fill="#C62828" font-style="italic" font-family="Arial">Register Request</text>
  <text x="380" y="285" text-anchor="middle" font-size="11" fill="#555" font-style="italic" font-family="Arial">flatMapGroupsWithState</text>

  <!-- ══════════════════════════════════════════════════════════════════
       INPUT EVENT UNION  (diamond)
       ══════════════════════════════════════════════════════════════════ -->
  <polygon points="510,159 546,189 510,219 474,189"
           fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
  <text x="510" y="185" text-anchor="middle" font-size="11" fill="#5D4037" font-weight="bold" font-family="Arial">tag &amp;</text>
  <text x="510" y="200" text-anchor="middle" font-size="11" fill="#5D4037" font-weight="bold" font-family="Arial">union</text>
  <text x="510" y="233" text-anchor="middle" font-size="10" fill="#888" font-style="italic" font-family="Arial">InputEvent</text>

  <!-- ══════════════════════════════════════════════════════════════════
       SYNOPSIS PROCESSOR HEXAGON
       ══════════════════════════════════════════════════════════════════ -->
  <polygon points="650,108 720,148 720,230 650,270 580,230 580,148"
           fill="white" stroke="#333" stroke-width="2.5"/>
  <!-- State Timeout badge above hex -->
  <rect x="604" y="83" width="92" height="20" rx="4"
        fill="#FFF3E0" stroke="#FF6F00" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="650" y="97" text-anchor="middle" font-size="10" fill="#E65100" font-weight="bold" font-family="Arial">⏱ State Timeout</text>
  <line x1="585" y1="189" x2="715" y2="189" stroke="#DDD" stroke-width="1.5"/>
  <text x="650" y="163" text-anchor="middle" font-size="16" fill="#1565C0" font-weight="bold" font-family="Arial">add</text>
  <text x="650" y="218" text-anchor="middle" font-size="14" fill="#C62828" font-weight="bold" font-family="Arial">estimate</text>
  <text x="650" y="285" text-anchor="middle" font-size="11" fill="#555" font-style="italic" font-family="Arial">flatMapGroupsWithState</text>
  <text x="650" y="299" text-anchor="middle" font-size="11" fill="#555" font-style="italic" font-family="Arial">GroupState + RocksDB</text>

  <!-- ══════════════════════════════════════════════════════════════════
       ROCKSDB — prominent cylinder, shifted down for clarity
       ══════════════════════════════════════════════════════════════════ -->
  <!-- dashed connector from hex bottom to cylinder top -->
  <line x1="650" y1="270" x2="650" y2="326"
        stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3"
        marker-end="url(#arocksdb)"/>
  <!-- cylinder body -->
  <rect x="604" y="342" width="92" height="58"
        fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5" rx="2"/>
  <!-- cylinder top cap -->
  <ellipse cx="650" cy="342" rx="46" ry="14"
           fill="#C8E6C9" stroke="#2E7D32" stroke-width="2.5"/>
  <!-- cylinder bottom cap -->
  <ellipse cx="650" cy="400" rx="46" ry="14"
           fill="#A5D6A7" stroke="#2E7D32" stroke-width="2.5"/>
  <!-- labels -->
  <text x="650" y="367" text-anchor="middle" font-size="14" fill="#1B5E20" font-weight="bold" font-family="Arial">RocksDB</text>
  <text x="650" y="386" text-anchor="middle" font-size="11" fill="#1B5E20" font-family="Arial">State Backend</text>
  <!-- checkpoint annotation below cylinder -->
  <text x="650" y="426" text-anchor="middle" font-size="10" fill="#2E7D32" font-style="italic" font-family="Arial">↓ checkpoint → HDFS / S3</text>

  <!-- ══════════════════════════════════════════════════════════════════
       PATH SPLITTER  (circle)
       ══════════════════════════════════════════════════════════════════ -->
  <text x="818" y="137" text-anchor="middle" font-size="11" fill="#E53935" font-weight="bold" font-family="Arial">Split</text>
  <circle cx="818" cy="189" r="42" fill="white" stroke="#E53935" stroke-width="2.5"/>
  <text x="818" y="185" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="Arial">Path</text>
  <text x="818" y="201" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="Arial">Splitter</text>
  <text x="818" y="245" text-anchor="middle" font-size="11" fill="#666" font-style="italic" font-family="Arial">filter()</text>

  <!-- ══════════════════════════════════════════════════════════════════
       REDUCE AGGREGATOR  (circle)
       ══════════════════════════════════════════════════════════════════ -->
  <text x="948" y="137" text-anchor="middle" font-size="12" fill="#333" font-weight="bold" font-family="Arial">Union</text>
  <circle cx="948" cy="189" r="42" fill="white" stroke="#E53935" stroke-width="2.5"/>
  <text x="948" y="183" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-family="Arial">Reduce</text>
  <text x="948" y="198" text-anchor="middle" font-size="11" fill="#333" font-weight="bold" font-family="Arial">Aggregator</text>
  <text x="948" y="246" text-anchor="middle" font-size="10" fill="#666" font-style="italic" font-family="Arial">flatMapGroupsWithState</text>

  <!-- ══════════════════════════════════════════════════════════════════
       MERGE FLATMAP  (purple rect)
       ══════════════════════════════════════════════════════════════════ -->
  <rect x="1044" y="167" width="72" height="44" rx="4"
        fill="#EDE7F6" stroke="#6A1B9A" stroke-width="2"/>
  <text x="1080" y="186" text-anchor="middle" font-size="14" fill="#6A1B9A" font-weight="bold" font-family="Arial">merge</text>
  <text x="1080" y="202" text-anchor="middle" font-size="11" fill="#6A1B9A" font-family="Arial">FlatMap</text>

  <!-- ══════════════════════════════════════════════════════════════════
       KAFKA OUTPUT TOPIC  (green oval, top-right)
       ══════════════════════════════════════════════════════════════════ -->
  <ellipse cx="1080" cy="106" rx="55" ry="33" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="1080" y="97"  text-anchor="middle" font-size="11" fill="#2E7D32" font-weight="bold" font-family="Arial">☁ kafka</text>
  <text x="1080" y="112" text-anchor="middle" font-size="12" fill="#2E7D32" font-weight="bold" font-family="Arial">Output</text>
  <text x="1080" y="126" text-anchor="middle" font-size="12" fill="#2E7D32" font-weight="bold" font-family="Arial">Topic</text>

  <!-- ══════════════════════════════════════════════════════════════════
       ARROWS
       ══════════════════════════════════════════════════════════════════ -->

  <!-- BLUE: Data Topic → parse (data) -->
  <line x1="143" y1="140" x2="164" y2="140"
        stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>

  <!-- BLUE: parse (data) → Routing Hex upper-left -->
  <path d="M244,140 Q292,140 310,153"
        fill="none" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>

  <!-- RED: Request Topic → parse (request) -->
  <line x1="143" y1="258" x2="164" y2="258"
        stroke="#C62828" stroke-width="2" marker-end="url(#ar)"/>

  <!-- RED: parse (request) → Routing Hex lower-left -->
  <path d="M244,258 Q292,258 310,227"
        fill="none" stroke="#C62828" stroke-width="2" marker-end="url(#ar)"/>

  <!-- BLUE: Routing Hex upper-right → Union diamond (top) -->
  <path d="M450,153 Q466,153 474,180"
        fill="none" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>

  <!-- RED: Routing Hex lower-right → Union diamond (bottom) -->
  <path d="M450,227 Q466,227 474,198"
        fill="none" stroke="#C62828" stroke-width="2" marker-end="url(#ar)"/>

  <!-- BLUE: Union → SynopsisProcessor -->
  <line x1="546" y1="189" x2="578" y2="189"
        stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>

  <!-- BLUE: SynopsisProcessor → PathSplitter -->
  <line x1="720" y1="189" x2="776" y2="189"
        stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>

  <!-- GREEN: PathSplitter upper arc → merge  [noOfP = 1, direct passthrough] -->
  <path d="M835,158 Q900,72 1042,178"
        fill="none" stroke="#2E7D32" stroke-width="2" marker-end="url(#ag)"/>
  <text x="886" y="82" font-size="10" fill="#2E7D32" font-style="italic" font-family="Arial">noOfP = 1</text>

  <!-- PURPLE: PathSplitter right → ReduceAggregator  [noOfP > 1] -->
  <line x1="860" y1="189" x2="904" y2="189"
        stroke="#6A1B9A" stroke-width="2" marker-end="url(#ap)"/>
  <text x="864" y="209" font-size="10" fill="#6A1B9A" font-style="italic" font-family="Arial">noOfP &gt; 1</text>

  <!-- PURPLE: ReduceAggregator → merge -->
  <line x1="990" y1="189" x2="1042" y2="189"
        stroke="#6A1B9A" stroke-width="2" marker-end="url(#ap)"/>

  <!-- GREEN: merge → Output Topic -->
  <line x1="1080" y1="167" x2="1080" y2="141"
        stroke="#2E7D32" stroke-width="2" marker-end="url(#ag)"/>

  <!-- ══════════════════════════════════════════════════════════════════
       LEGEND
       ══════════════════════════════════════════════════════════════════ -->
  <rect x="22" y="478" width="1106" height="34" rx="5"
        fill="#F5F5F5" stroke="#DDD" stroke-width="1"/>

  <line x1="42"  y1="495" x2="72"  y2="495" stroke="#1565C0" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="78"  y="499" font-size="12" fill="#1565C0" font-weight="bold" font-family="Arial">—Data Path</text>

  <line x1="190" y1="495" x2="220" y2="495" stroke="#C62828" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="226" y="499" font-size="12" fill="#C62828" font-weight="bold" font-family="Arial">—Requests Path</text>

  <line x1="380" y1="495" x2="410" y2="495" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="416" y="499" font-size="12" fill="#2E7D32" font-weight="bold" font-family="Arial">—Single-stream Synopsis Estimation</text>

  <line x1="710" y1="495" x2="740" y2="495" stroke="#6A1B9A" stroke-width="2.5" marker-end="url(#ap)"/>
  <text x="746" y="499" font-size="12" fill="#6A1B9A" font-weight="bold" font-family="Arial">—Mergeable Synopsis Estimation</text>

</svg>

<p>Figure: The SDE Spark Architecture</p>

</body>
</html>

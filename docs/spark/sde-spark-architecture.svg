<svg xmlns="http://www.w3.org/2000/svg" width="1150" height="520" viewBox="0 0 1150 520">
  <defs>
    <marker id="ab" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0 0, 8 3.5, 0 7" fill="#1565C0"/></marker>
    <marker id="ar" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0 0, 8 3.5, 0 7" fill="#C62828"/></marker>
    <marker id="ag" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0 0, 8 3.5, 0 7" fill="#2E7D32"/></marker>
    <marker id="ap" markerWidth="8" markerHeight="7" refX="7" refY="3.5" orient="auto"><polygon points="0 0, 8 3.5, 0 7" fill="#6A1B9A"/></marker>
    <marker id="arocksdb" markerWidth="7" markerHeight="7" refX="6" refY="3.5" orient="auto"><polygon points="0 0, 7 3.5, 0 7" fill="#2E7D32"/></marker>
  </defs>

  <!-- LAYER HEADER BAND -->
  <rect x="0" y="0" width="1150" height="40" fill="#EEF2F7"/>
  <text x="77"   y="16" text-anchor="middle" font-size="11" font-family="Arial" fill="#333"    font-weight="bold">Input</text>
  <text x="77"   y="30" text-anchor="middle" font-size="10" font-family="Arial" fill="#666">Kafka</text>
  <text x="215"  y="16" text-anchor="middle" font-size="11" font-family="Arial" fill="#1565C0" font-weight="bold">Layer 1</text>
  <text x="215"  y="30" text-anchor="middle" font-size="10" font-family="Arial" fill="#555">Ingestion &amp; Parsing</text>
  <text x="420"  y="16" text-anchor="middle" font-size="11" font-family="Arial" fill="#1565C0" font-weight="bold">Layer 2</text>
  <text x="420"  y="30" text-anchor="middle" font-size="10" font-family="Arial" fill="#555">Routing &amp; Registration</text>
  <text x="655"  y="16" text-anchor="middle" font-size="11" font-family="Arial" fill="#1565C0" font-weight="bold">Layer 3</text>
  <text x="655"  y="30" text-anchor="middle" font-size="10" font-family="Arial" fill="#555">Synopsis Processing</text>
  <text x="815"  y="16" text-anchor="middle" font-size="11" font-family="Arial" fill="#1565C0" font-weight="bold">Layer 4</text>
  <text x="815"  y="30" text-anchor="middle" font-size="10" font-family="Arial" fill="#555">Path Splitting</text>
  <text x="950"  y="16" text-anchor="middle" font-size="11" font-family="Arial" fill="#1565C0" font-weight="bold">Layer 5</text>
  <text x="950"  y="30" text-anchor="middle" font-size="10" font-family="Arial" fill="#555">Aggregation</text>
  <text x="1083" y="16" text-anchor="middle" font-size="11" font-family="Arial" fill="#1565C0" font-weight="bold">Layer 6</text>
  <text x="1083" y="30" text-anchor="middle" font-size="10" font-family="Arial" fill="#555">Output</text>

  <!-- VERTICAL LAYER SEPARATORS -->
  <line x1="154"  y1="40" x2="154"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="277"  y1="40" x2="277"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="563"  y1="40" x2="563"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="748"  y1="40" x2="748"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="883"  y1="40" x2="883"  y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>
  <line x1="1017" y1="40" x2="1017" y2="475" stroke="#BBBBBB" stroke-width="1" stroke-dasharray="5,4"/>

  <!-- KAFKA DATA TOPIC -->
  <ellipse cx="75" cy="140" rx="68" ry="38" fill="#DCEEFB" stroke="#1565C0" stroke-width="2.5"/>
  <text x="75" y="130" text-anchor="middle" font-size="11" font-family="Arial" fill="#1565C0" font-weight="bold">&#9729; kafka</text>
  <text x="75" y="146" text-anchor="middle" font-size="13" font-family="Arial" fill="#1565C0" font-weight="bold">Data</text>
  <text x="75" y="162" text-anchor="middle" font-size="13" font-family="Arial" fill="#1565C0" font-weight="bold">Topic</text>

  <!-- KAFKA REQUEST TOPIC -->
  <ellipse cx="75" cy="258" rx="68" ry="38" fill="#FFEBEE" stroke="#C62828" stroke-width="2.5"/>
  <text x="75" y="248" text-anchor="middle" font-size="11" font-family="Arial" fill="#C62828" font-weight="bold">&#9729; kafka</text>
  <text x="75" y="264" text-anchor="middle" font-size="13" font-family="Arial" fill="#C62828" font-weight="bold">Request</text>
  <text x="75" y="280" text-anchor="middle" font-size="13" font-family="Arial" fill="#C62828" font-weight="bold">Topic</text>

  <!-- PARSE MAP (DATA) -->
  <rect x="166" y="118" width="78" height="44" rx="8" fill="#DCEEFB" stroke="#1565C0" stroke-width="2"/>
  <text x="205" y="137" text-anchor="middle" font-size="13" font-family="Arial" fill="#1565C0" font-weight="bold">parse</text>
  <text x="205" y="154" text-anchor="middle" font-size="11" font-family="Arial" fill="#1565C0">Map</text>

  <!-- PARSE MAP (REQUEST) -->
  <rect x="166" y="236" width="78" height="44" rx="8" fill="#FFEBEE" stroke="#C62828" stroke-width="2"/>
  <text x="205" y="255" text-anchor="middle" font-size="13" font-family="Arial" fill="#C62828" font-weight="bold">parse</text>
  <text x="205" y="272" text-anchor="middle" font-size="11" font-family="Arial" fill="#C62828">Map</text>

  <!-- ROUTING LAYER HEXAGON -->
  <polygon points="380,108 450,148 450,230 380,270 310,230 310,148" fill="white" stroke="#333" stroke-width="2.5"/>
  <line x1="315" y1="189" x2="445" y2="189" stroke="#DDD" stroke-width="1.5"/>
  <text x="380" y="162" text-anchor="middle" font-size="13" font-family="Arial" fill="#1565C0" font-weight="bold">DataRouter</text>
  <text x="380" y="178" text-anchor="middle" font-size="10" font-family="Arial" fill="#1565C0" font-style="italic">HashData</text>
  <text x="380" y="213" text-anchor="middle" font-size="13" font-family="Arial" fill="#C62828" font-weight="bold">RequestRouter</text>
  <text x="380" y="229" text-anchor="middle" font-size="10" font-family="Arial" fill="#C62828" font-style="italic">Register Request</text>
  <text x="380" y="285" text-anchor="middle" font-size="11" font-family="Arial" fill="#555" font-style="italic">flatMapGroupsWithState</text>

  <!-- INPUT EVENT UNION (diamond) -->
  <polygon points="510,159 546,189 510,219 474,189" fill="#FFF9C4" stroke="#F9A825" stroke-width="2"/>
  <text x="510" y="185" text-anchor="middle" font-size="11" font-family="Arial" fill="#5D4037" font-weight="bold">tag &amp;</text>
  <text x="510" y="200" text-anchor="middle" font-size="11" font-family="Arial" fill="#5D4037" font-weight="bold">union</text>
  <text x="510" y="233" text-anchor="middle" font-size="10" font-family="Arial" fill="#888" font-style="italic">InputEvent</text>

  <!-- SYNOPSIS PROCESSOR HEXAGON -->
  <polygon points="650,108 720,148 720,230 650,270 580,230 580,148" fill="white" stroke="#333" stroke-width="2.5"/>
  <rect x="604" y="83" width="92" height="20" rx="4" fill="#FFF3E0" stroke="#FF6F00" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="650" y="97" text-anchor="middle" font-size="10" font-family="Arial" fill="#E65100" font-weight="bold">&#9201; State Timeout</text>
  <line x1="585" y1="189" x2="715" y2="189" stroke="#DDD" stroke-width="1.5"/>
  <text x="650" y="163" text-anchor="middle" font-size="16" font-family="Arial" fill="#1565C0" font-weight="bold">add</text>
  <text x="650" y="218" text-anchor="middle" font-size="14" font-family="Arial" fill="#C62828" font-weight="bold">estimate</text>
  <text x="650" y="285" text-anchor="middle" font-size="11" font-family="Arial" fill="#555" font-style="italic">flatMapGroupsWithState</text>
  <text x="650" y="299" text-anchor="middle" font-size="11" font-family="Arial" fill="#555" font-style="italic">GroupState + RocksDB</text>

  <!-- ROCKSDB CYLINDER (shifted down for clarity) -->
  <line x1="650" y1="270" x2="650" y2="326" stroke="#2E7D32" stroke-width="2" stroke-dasharray="5,3" marker-end="url(#arocksdb)"/>
  <rect x="604" y="342" width="92" height="58" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5" rx="2"/>
  <ellipse cx="650" cy="342" rx="46" ry="14" fill="#C8E6C9" stroke="#2E7D32" stroke-width="2.5"/>
  <ellipse cx="650" cy="400" rx="46" ry="14" fill="#A5D6A7" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="650" y="367" text-anchor="middle" font-size="14" font-family="Arial" fill="#1B5E20" font-weight="bold">RocksDB</text>
  <text x="650" y="386" text-anchor="middle" font-size="11" font-family="Arial" fill="#1B5E20">State Backend</text>
  <text x="650" y="426" text-anchor="middle" font-size="10" font-family="Arial" fill="#2E7D32" font-style="italic">&#8595; checkpoint &#8594; HDFS / S3</text>

  <!-- PATH SPLITTER -->
  <text x="818" y="137" text-anchor="middle" font-size="11" font-family="Arial" fill="#E53935" font-weight="bold">Split</text>
  <circle cx="818" cy="189" r="42" fill="white" stroke="#E53935" stroke-width="2.5"/>
  <text x="818" y="185" text-anchor="middle" font-size="12" font-family="Arial" fill="#333" font-weight="bold">Path</text>
  <text x="818" y="201" text-anchor="middle" font-size="12" font-family="Arial" fill="#333" font-weight="bold">Splitter</text>
  <text x="818" y="245" text-anchor="middle" font-size="11" font-family="Arial" fill="#666" font-style="italic">filter()</text>

  <!-- REDUCE AGGREGATOR -->
  <text x="948" y="137" text-anchor="middle" font-size="12" font-family="Arial" fill="#333" font-weight="bold">Union</text>
  <circle cx="948" cy="189" r="42" fill="white" stroke="#E53935" stroke-width="2.5"/>
  <text x="948" y="183" text-anchor="middle" font-size="11" font-family="Arial" fill="#333" font-weight="bold">Reduce</text>
  <text x="948" y="198" text-anchor="middle" font-size="11" font-family="Arial" fill="#333" font-weight="bold">Aggregator</text>
  <text x="948" y="246" text-anchor="middle" font-size="10" font-family="Arial" fill="#666" font-style="italic">flatMapGroupsWithState</text>

  <!-- MERGE FLATMAP -->
  <rect x="1044" y="167" width="72" height="44" rx="4" fill="#EDE7F6" stroke="#6A1B9A" stroke-width="2"/>
  <text x="1080" y="186" text-anchor="middle" font-size="14" font-family="Arial" fill="#6A1B9A" font-weight="bold">merge</text>
  <text x="1080" y="202" text-anchor="middle" font-size="11" font-family="Arial" fill="#6A1B9A">FlatMap</text>

  <!-- KAFKA OUTPUT TOPIC -->
  <ellipse cx="1080" cy="106" rx="55" ry="33" fill="#E8F5E9" stroke="#2E7D32" stroke-width="2.5"/>
  <text x="1080" y="97"  text-anchor="middle" font-size="11" font-family="Arial" fill="#2E7D32" font-weight="bold">&#9729; kafka</text>
  <text x="1080" y="112" text-anchor="middle" font-size="12" font-family="Arial" fill="#2E7D32" font-weight="bold">Output</text>
  <text x="1080" y="126" text-anchor="middle" font-size="12" font-family="Arial" fill="#2E7D32" font-weight="bold">Topic</text>

  <!-- ARROWS -->
  <line x1="143" y1="140" x2="164" y2="140" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>
  <path d="M244,140 Q292,140 310,153" fill="none" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="143" y1="258" x2="164" y2="258" stroke="#C62828" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M244,258 Q292,258 310,227" fill="none" stroke="#C62828" stroke-width="2" marker-end="url(#ar)"/>
  <path d="M450,153 Q466,153 474,180" fill="none" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>
  <path d="M450,227 Q466,227 474,198" fill="none" stroke="#C62828" stroke-width="2" marker-end="url(#ar)"/>
  <line x1="546" y1="189" x2="578" y2="189" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>
  <line x1="720" y1="189" x2="776" y2="189" stroke="#1565C0" stroke-width="2" marker-end="url(#ab)"/>
  <path d="M835,158 Q900,72 1042,178" fill="none" stroke="#2E7D32" stroke-width="2" marker-end="url(#ag)"/>
  <text x="886" y="82" font-size="10" font-family="Arial" fill="#2E7D32" font-style="italic">noOfP = 1</text>
  <line x1="860" y1="189" x2="904" y2="189" stroke="#6A1B9A" stroke-width="2" marker-end="url(#ap)"/>
  <text x="864" y="209" font-size="10" font-family="Arial" fill="#6A1B9A" font-style="italic">noOfP &gt; 1</text>
  <line x1="990" y1="189" x2="1042" y2="189" stroke="#6A1B9A" stroke-width="2" marker-end="url(#ap)"/>
  <line x1="1080" y1="167" x2="1080" y2="141" stroke="#2E7D32" stroke-width="2" marker-end="url(#ag)"/>

  <!-- LEGEND -->
  <rect x="22" y="478" width="1106" height="34" rx="5" fill="#F5F5F5" stroke="#DDD" stroke-width="1"/>
  <line x1="42"  y1="495" x2="72"  y2="495" stroke="#1565C0" stroke-width="2.5" marker-end="url(#ab)"/>
  <text x="78"  y="499" font-size="12" font-family="Arial" fill="#1565C0" font-weight="bold">&#8212;Data Path</text>
  <line x1="190" y1="495" x2="220" y2="495" stroke="#C62828" stroke-width="2.5" marker-end="url(#ar)"/>
  <text x="226" y="499" font-size="12" font-family="Arial" fill="#C62828" font-weight="bold">&#8212;Requests Path</text>
  <line x1="380" y1="495" x2="410" y2="495" stroke="#2E7D32" stroke-width="2.5" marker-end="url(#ag)"/>
  <text x="416" y="499" font-size="12" font-family="Arial" fill="#2E7D32" font-weight="bold">&#8212;Single-stream Synopsis Estimation</text>
  <line x1="710" y1="495" x2="740" y2="495" stroke="#6A1B9A" stroke-width="2.5" marker-end="url(#ap)"/>
  <text x="746" y="499" font-size="12" font-family="Arial" fill="#6A1B9A" font-weight="bold">&#8212;Mergeable Synopsis Estimation</text>

  <!-- FIGURE CAPTION -->
  <text x="575" y="516" text-anchor="middle" font-size="13" font-family="Arial" fill="#333" font-weight="bold">Figure: The SDE Spark Architecture</text>
</svg>
